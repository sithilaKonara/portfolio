# .github/workflows/sync-credly-badges.yml
#
# Scrapes public Credly profile and commits badges.json only if changed.
#
# Required repo secret (Settings → Secrets → Actions):
#   CREDLY_USERNAME — your Credly profile username (e.g. sithila-konara)

name: Sync Credly Badges

on:
  schedule:
    - cron: '0 7 * * *'  # daily 07:00 UTC = 10:00 Helsinki
  workflow_dispatch:

jobs:
  fetch-and-commit:
    name: Fetch Credly badges and commit if changed
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run fetch-credly.py
        run: |
          python3 scripts/fetch-credly.py \
            --username ${{ secrets.CREDLY_USERNAME }}

      - name: Commit only if badges changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/data/badges.json

          if git diff --cached --quiet; then
            echo "✓ No badge changes — skipping commit"
          else
            echo "Changes detected:"
            git diff --cached --stat
            git commit -m "chore(data): sync Credly badges $(date -u '+%Y-%m-%d') [skip ci]"
            git push
            echo "✓ Pushed updated badges"
          fi