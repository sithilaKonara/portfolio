# .github/workflows/fetch-posts.yml
# Runs daily at 06:00 UTC (08:00 Helsinki time).
# Fetches your Medium RSS feed, converts it to posts.json,
# and commits it back to the repo — which triggers a CF Pages deploy.

name: Fetch Medium Posts

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:        # also allow manual trigger from GH UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit posts.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch & parse Medium RSS
        env:
          MEDIUM_USERNAME: ${{ secrets.MEDIUM_USERNAME }}
        run: |
          set -e

          USERNAME="${{ env.MEDIUM_USERNAME }}"
          URLS=(
            "https://medium.com/feed/@${USERNAME}"
            "https://medium.com/feed/${USERNAME}"
          )

          # Curl settings
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          ACCEPT_HEADER="Accept: application/rss+xml, application/xml, text/xml, */*"

          FEED_DATA=""
          for URL in "${URLS[@]}"; do
            echo "→ Trying $URL"
            for TRY in 1 2 3; do
              if FEED_DATA=$(curl -sSL --max-time 15 \
                  -H "User-Agent: $USER_AGENT" \
                  -H "$ACCEPT_HEADER" \
                  "$URL" 2>/dev/null); then
                if echo "$FEED_DATA" | grep -q '<rss'; then
                  echo "✓ Success (attempt $TRY)"
                  break 2
                else
                  echo "⚠️ Response is not RSS (attempt $TRY)"
                fi
              else
                echo "⚠️ Curl failed (attempt $TRY)"
              fi
              sleep $((TRY * 2))
            done
            echo "❌ All attempts failed for $URL"
          done

          if [ -z "$FEED_DATA" ]; then
            echo "❌ Could not fetch Medium feed from any URL."
            exit 1
          fi

          # Parse the feed with Python (reads from stdin)
          python3 - <<'EOF'
          import sys, json, re, xml.etree.ElementTree as ET
          from datetime import datetime

          feed_xml = sys.stdin.read()
          try:
              tree = ET.fromstring(feed_xml)
          except ET.ParseError as e:
              print(f"❌ XML parsing error: {e}", file=sys.stderr)
              sys.exit(1)

          ns = {
              'content': 'http://purl.org/rss/1.0/modules/content/',
              'dc':      'http://purl.org/dc/elements/1.1/',
              'media':   'http://search.yahoo.com/mrss/',
          }

          posts = []
          for item in tree.findall('.//item'):
              # Thumbnail
              thumbnail = None
              content_encoded = item.findtext('content:encoded', namespaces=ns) or ''
              img_match = re.search(r'<img[^>]+src="([^"]+)"', content_encoded)
              if img_match:
                  thumbnail = img_match.group(1)

              # Plain excerpt
              plain = re.sub(r'<[^>]+>', '', content_encoded)
              excerpt = plain.strip()[:200].rsplit(' ', 1)[0] + '…' if len(plain) > 200 else plain.strip()

              # Categories
              categories = [c.text for c in item.findall('category') if c.text]
              primary_cat = categories[0].upper() if categories else 'DEVOPS'

              # Date
              pub_raw = item.findtext('pubDate') or ''
              try:
                  dt = datetime.strptime(pub_raw, '%a, %d %b %Y %H:%M:%S %Z')
                  pub_date = dt.strftime('%m.%d.%Y')
              except Exception:
                  pub_date = pub_raw[:10]

              posts.append({
                  'title':     item.findtext('title') or '',
                  'link':      item.findtext('link') or '',
                  'pubDate':   pub_date,
                  'category':  primary_cat,
                  'excerpt':   excerpt,
                  'thumbnail': thumbnail,
                  'guid':      item.findtext('guid') or '',
              })

          with open('src/data/posts.json', 'w') as f:
              json.dump(posts, f, indent=2, ensure_ascii=False)

          print(f"✓ Wrote {len(posts)} posts to src/data/posts.json")
          EOF

      - name: Commit posts.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/posts.json
          if git diff --cached --quiet; then
            echo "No changes to posts.json — skipping commit."
          else
            git commit -m "chore: update Medium posts [skip ci]"
            git push
          fi
