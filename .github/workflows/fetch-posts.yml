# .github/workflows/fetch-posts.yml
name: Fetch Medium Posts

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install XML parser and JSON processor
        run: |
          sudo apt-get update
          sudo apt-get install -y xmlstarlet jq

      - name: Fetch & parse Medium RSS (Bash version)
        env:
          MEDIUM_USERNAME: ${{ secrets.MEDIUM_USERNAME }}
        run: |
          set -e

          USERNAME="${{ env.MEDIUM_USERNAME }}"
          URLS=(
            "https://medium.com/feed/@${USERNAME}"
            "https://medium.com/feed/${USERNAME}"
          )
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          ACCEPT_HEADER="Accept: application/rss+xml, application/xml, text/xml, */*"

          FEED_DATA=""
          for URL in "${URLS[@]}"; do
            echo "→ Trying $URL"
            for TRY in 1 2 3; do
              if FEED_DATA=$(curl -sSL --max-time 15 \
                  -H "User-Agent: $USER_AGENT" \
                  -H "$ACCEPT_HEADER" \
                  "$URL" 2>/dev/null); then
                if echo "$FEED_DATA" | grep -q '<rss'; then
                  echo "✓ Success (attempt $TRY)"
                  break 2
                else
                  echo "⚠️ Response is not RSS (attempt $TRY)"
                fi
              else
                echo "⚠️ Curl failed (attempt $TRY)"
              fi
              sleep $((TRY * 2))
            done
            echo "❌ All attempts failed for $URL"
          done

          if [ -z "$FEED_DATA" ]; then
            echo "❌ Could not fetch Medium feed from any URL."
            exit 1
          fi

          # Save feed to a temporary file
          echo "$FEED_DATA" > /tmp/feed.xml

          # --- Parse with xmlstarlet & jq ---
          # We'll build a JSON array by iterating over each <item>.
          # For each item, we extract fields and create a JSON object.
          # Then we combine them into a final array.

          # Define an associative array to hold per-item data temporarily.
          # Using a temporary file to accumulate JSON objects, one per line.
          > /tmp/posts.json.tmp

          # XPath expressions
          XP_TITLE=".//title"
          XP_LINK=".//link"
          XP_PUBDATE=".//pubDate"
          XP_GUID=".//guid"
          XP_CATEGORY=".//category[1]"   # first category
          XP_CONTENT=".//content:encoded"
          XP_THUMB=".//media:thumbnail/@url"

          # Namespace definitions for xmlstarlet (must match RSS)
          NS="xmlns:content=http://purl.org/rss/1.0/modules/content/ xmlns:dc=http://purl.org/dc/elements/1.1/ xmlns:media=http://search.yahoo.com/mrss/"

          # Count items
          ITEM_COUNT=$(xmlstarlet sel -T -t -v "count(//item)" /tmp/feed.xml)
          echo "Found $ITEM_COUNT items in feed."

          if [ "$ITEM_COUNT" -eq 0 ]; then
            echo "❌ No items found in feed. Check the feed URL or your username."
            exit 1
          fi

          # Loop over item indices (1-based)
          for ((i=1; i<=ITEM_COUNT; i++)); do
            # Extract fields using xmlstarlet with namespaces
            TITLE=$(xmlstarlet sel -T -t -v "//item[$i]/title" /tmp/feed.xml 2>/dev/null || echo "")
            LINK=$(xmlstarlet sel -T -t -v "//item[$i]/link" /tmp/feed.xml 2>/dev/null || echo "")
            PUB_DATE_RAW=$(xmlstarlet sel -T -t -v "//item[$i]/pubDate" /tmp/feed.xml 2>/dev/null || echo "")
            GUID=$(xmlstarlet sel -T -t -v "//item[$i]/guid" /tmp/feed.xml 2>/dev/null || echo "")
            CATEGORY=$(xmlstarlet sel -T -t -v "//item[$i]/category[1]" /tmp/feed.xml 2>/dev/null || echo "")
            # For thumbnail, try media:thumbnail
            THUMB=$(xmlstarlet sel -T -t -v "//item[$i]/media:thumbnail/@url" /tmp/feed.xml 2>/dev/null || echo "")
            # Content:encoded (HTML)
            CONTENT_HTML=$(xmlstarlet sel -T -t -v "//item[$i]/content:encoded" /tmp/feed.xml 2>/dev/null || echo "")

            # If thumbnail not found via media, try to extract first image from content
            if [ -z "$THUMB" ] && [ -n "$CONTENT_HTML" ]; then
              # Use grep/sed to extract first img src (crude but works for most)
              THUMB=$(echo "$CONTENT_HTML" | sed -n 's/.*<img[^>]*src="\([^"]*\)".*/\1/p' | head -1)
            fi

            # Build plain excerpt: strip HTML tags from content, take first ~200 chars
            PLAIN=$(echo "$CONTENT_HTML" | sed -e 's/<[^>]*>//g' -e 's/&nbsp;/ /g' | tr -s ' ' | head -c 200)
            # Trim trailing spaces and ensure we don't cut mid-word; we'll use jq to handle truncation with ellipsis in post-processing?
            # For simplicity, we'll use jq to truncate later, but we need to pass the full plain text.
            # Better: pass full plain text, and let jq do the substring.
            PLAIN_FULL=$(echo "$CONTENT_HTML" | sed -e 's/<[^>]*>//g' -e 's/&nbsp;/ /g' | tr -s ' ')

            # Format date: try to parse with date command (GNU date)
            # Medium uses RFC 2822 format, e.g., "Mon, 20 Mar 2023 12:00:00 GMT"
            # We'll convert to "mm.dd.yyyy" using date -d
            FORMATTED_DATE=""
            if [ -n "$PUB_DATE_RAW" ]; then
              if date -d "$PUB_DATE_RAW" >/dev/null 2>&1; then
                FORMATTED_DATE=$(date -d "$PUB_DATE_RAW" +"%m.%d.%Y")
              else
                # fallback: just first 10 chars
                FORMATTED_DATE=$(echo "$PUB_DATE_RAW" | cut -c1-10)
              fi
            fi

            # Category: uppercase first category or default
            if [ -n "$CATEGORY" ]; then
              PRIMARY_CAT=$(echo "$CATEGORY" | tr '[:lower:]' '[:upper:]')
            else
              PRIMARY_CAT="DEVOPS"
            fi

            # Build a JSON object for this item using jq.
            # We need to escape strings properly; jq can handle via --arg.
            # We'll pass all variables to jq.
            # Also, for excerpt we truncate to 200 chars and add ellipsis if needed.
            jq -n \
              --arg title "$TITLE" \
              --arg link "$LINK" \
              --arg pubDate "$FORMATTED_DATE" \
              --arg category "$PRIMARY_CAT" \
              --arg thumbnail "$THUMB" \
              --arg guid "$GUID" \
              --arg plain "$PLAIN_FULL" \
              '{
                title: $title,
                link: $link,
                pubDate: $pubDate,
                category: $category,
                excerpt: (if ($plain | length) > 200 then ($plain[0:200] | rtrimstr(" ") | sub(" [^ ]*$"; "")) + "…" else $plain end),
                thumbnail: $thumbnail,
                guid: $guid
              }' >> /tmp/posts.json.tmp
          done

          # Combine all object lines into a final JSON array.
          jq -s '.' /tmp/posts.json.tmp > src/data/posts.json

          echo "✓ Wrote $(jq length src/data/posts.json) posts to src/data/posts.json"

      - name: Test JSON output
        run: |
          # Verify JSON is valid and contains expected fields
          if ! jq empty src/data/posts.json 2>/dev/null; then
            echo "❌ Invalid JSON in src/data/posts.json"
            exit 1
          fi

          COUNT=$(jq length src/data/posts.json)
          if [ "$COUNT" -eq 0 ]; then
            echo "❌ posts.json is empty (no posts found)"
            exit 1
          fi

          # Check first post has required fields
          if ! jq -e '.[0] | has("title") and has("link") and has("pubDate") and has("category") and has("excerpt") and has("thumbnail") and has("guid")' src/data/posts.json >/dev/null; then
            echo "❌ First post is missing required fields"
            exit 1
          fi

          echo "✅ Test passed: posts.json is valid and contains $COUNT post(s)"

      - name: Commit posts.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/posts.json
          if git diff --cached --quiet; then
            echo "No changes to posts.json — skipping commit."
          else
            git commit -m "chore: update Medium posts [skip ci]"
            git push
          fi