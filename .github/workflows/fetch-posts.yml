name: Fetch Medium Posts

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xmlstarlet jq

      - name: Make scraper executable
        run: chmod +x .github/scripts/scraper.sh

      - name: Run scraper
        env:
          MEDIUM_USERNAME: ${{ secrets.MEDIUM_USERNAME }}
        run: .github/scripts/scraper.sh

      - name: Test JSON output
        run: |
          if ! jq empty src/data/posts.json 2>/dev/null; then
            echo "❌ Invalid JSON in src/data/posts.json"
            exit 1
          fi
          COUNT=$(jq length src/data/posts.json)
          if [ "$COUNT" -eq 0 ]; then
            echo "❌ posts.json is empty (no posts found)"
            exit 1
          fi
          if ! jq -e '.[0] | has("title") and has("link") and has("pubDate") and has("category") and has("excerpt") and has("thumbnail") and has("guid")' src/data/posts.json >/dev/null; then
            echo "❌ First post is missing required fields"
            exit 1
          fi
          echo "✅ Test passed: posts.json is valid and contains $COUNT post(s)"

      - name: Commit posts.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/posts.json
          if git diff --cached --quiet; then
            echo "No changes to posts.json — skipping commit."
          else
            git commit -m "chore: update Medium posts [skip ci]"
            git push
          fi