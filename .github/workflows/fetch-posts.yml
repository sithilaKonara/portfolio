# .github/workflows/fetch-posts.yml
name: Fetch Medium Posts

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:        # manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit posts.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install XML parser and JSON processor
        run: |
          sudo apt-get update
          sudo apt-get install -y xmlstarlet jq

      - name: Fetch & parse Medium RSS (Bash version)
        env:
          MEDIUM_USERNAME: ${{ secrets.MEDIUM_USERNAME }}
        run: |
          set -e

          USERNAME="${{ env.MEDIUM_USERNAME }}"
          URLS=(
            "https://medium.com/feed/@${USERNAME}"
            "https://medium.com/feed/${USERNAME}"
          )
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          ACCEPT_HEADER="Accept: application/rss+xml, application/xml, text/xml, *.*"

          FEED_DATA=""
          for URL in "${URLS[@]}"; do
            echo "→ Trying $URL"
            for TRY in 1 2 3; do
              if FEED_DATA=$(curl -sSL --max-time 15 \
                  -H "User-Agent: $USER_AGENT" \
                  -H "$ACCEPT_HEADER" \
                  "$URL" 2>/dev/null); then
                if echo "$FEED_DATA" | grep -q '<rss'; then
                  echo "✓ Success (attempt $TRY)"
                  break 2
                else
                  echo "⚠️ Response is not RSS (attempt $TRY)"
                fi
              else
                echo "⚠️ Curl failed (attempt $TRY)"
              fi
              sleep $((TRY * 2))
            done
            echo "❌ All attempts failed for $URL"
          done

          if [ -z "$FEED_DATA" ]; then
            echo "❌ Could not fetch Medium feed from any URL."
            exit 1
          fi

          # Save feed to temporary file
          echo "$FEED_DATA" > /tmp/feed.xml

          # Count items
          ITEM_COUNT=$(xmlstarlet sel -T -t -v "count(//item)" /tmp/feed.xml 2>/dev/null || echo "0")
          echo "Found $ITEM_COUNT items in feed."

          if [ "$ITEM_COUNT" -eq 0 ]; then
            echo "❌ No items found in feed. Check the feed URL or your username."
            exit 1
          fi

          # Create target directory
          mkdir -p src/data

          # Temporary file to hold one JSON object per line
          > /tmp/posts.json.tmp

          # Process each item (index 1‑based)
          for ((i=1; i<=ITEM_COUNT; i++)); do
            # Extract fields using xmlstarlet with explicit namespaces
            TITLE=$(xmlstarlet sel -T -t -v "//item[$i]/title" /tmp/feed.xml 2>/dev/null || echo "")
            LINK=$(xmlstarlet sel -T -t -v "//item[$i]/link" /tmp/feed.xml 2>/dev/null || echo "")
            PUB_DATE_RAW=$(xmlstarlet sel -T -t -v "//item[$i]/pubDate" /tmp/feed.xml 2>/dev/null || echo "")
            GUID=$(xmlstarlet sel -T -t -v "//item[$i]/guid" /tmp/feed.xml 2>/dev/null || echo "")
            CATEGORY=$(xmlstarlet sel -T -t -v "//item[$i]/category[1]" /tmp/feed.xml 2>/dev/null || echo "")

            # Content:encoded (HTML)
            CONTENT_HTML=$(xmlstarlet sel -N content="http://purl.org/rss/1.0/modules/content/" -T -t -v "//item[$i]/content:encoded" /tmp/feed.xml 2>/dev/null || echo "")

            # --- Thumbnail extraction: skip tracking pixels, get first real image ---
            THUMB=""
            if [ -n "$CONTENT_HTML" ]; then
              # Extract all img src targets sequentially, filter tracking pixels, grab the first one
              THUMB=$(echo "$CONTENT_HTML" | \
                grep -oP '<img[^>]+src="\K[^"]+' | \
                grep -v '/_/stat?' | \
                head -n 1 || true)
            fi

            # If still empty, fall back to media:thumbnail (but skip tracking)
            if [ -z "$THUMB" ]; then
              MEDIA_THUMB=$(xmlstarlet sel -N media="http://search.yahoo.com/mrss/" -T -t -v "//item[$i]/media:thumbnail/@url" /tmp/feed.xml 2>/dev/null || echo "")
              if ! echo "$MEDIA_THUMB" | grep -q '/_/stat?'; then
                THUMB="$MEDIA_THUMB"
              fi
            fi

            # If still empty, leave THUMB as empty string

            # Strip HTML tags to get plain text (full)
            PLAIN_FULL=$(echo "$CONTENT_HTML" | sed -e 's/<[^>]*>//g' -e 's/&nbsp;/ /g' | tr -s ' ' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

            # Format date (MM.DD.YYYY)
            FORMATTED_DATE=""
            if [ -n "$PUB_DATE_RAW" ]; then
              if date -d "$PUB_DATE_RAW" >/dev/null 2>&1; then
                FORMATTED_DATE=$(date -d "$PUB_DATE_RAW" +"%m.%d.%Y")
              else
                # Fallback: just take first 10 characters
                FORMATTED_DATE=$(echo "$PUB_DATE_RAW" | cut -c1-10)
              fi
            fi

            # Category: uppercase first category, else default
            if [ -n "$CATEGORY" ]; then
              PRIMARY_CAT=$(echo "$CATEGORY" | tr '[:lower:]' '[:upper:]')
            else
              PRIMARY_CAT="DEVOPS"
            fi

            # Build JSON object with jq (truncation of excerpt is done here)
            jq -n \
              --arg title "$TITLE" \
              --arg link "$LINK" \
              --arg pubDate "$FORMATTED_DATE" \
              --arg category "$PRIMARY_CAT" \
              --arg thumbnail "$THUMB" \
              --arg guid "$GUID" \
              --arg plain "$PLAIN_FULL" \
              '{
                title: $title,
                link: $link,
                pubDate: $pubDate,
                category: $category,
                excerpt: (if ($plain | length) > 200 then ($plain[0:200] | rtrimstr(" ") | sub(" [^ ]*$"; "")) + "…" else $plain end),
                thumbnail: $thumbnail,
                guid: $guid
              }' >> /tmp/posts.json.tmp
          done

          # Combine all objects into a JSON array
          jq -s '.' /tmp/posts.json.tmp > src/data/posts.json

          echo "✓ Wrote $(jq length src/data/posts.json) posts to src/data/posts.json"

      - name: Test JSON output
        run: |
          # Validate JSON syntax
          if ! jq empty src/data/posts.json 2>/dev/null; then
            echo "❌ Invalid JSON in src/data/posts.json"
            exit 1
          fi

          COUNT=$(jq length src/data/posts.json)
          if [ "$COUNT" -eq 0 ]; then
            echo "❌ posts.json is empty (no posts found)"
            exit 1
          fi

          # Check that first post has required fields
          if ! jq -e '.[0] | has("title") and has("link") and has("pubDate") and has("category") and has("excerpt") and has("thumbnail") and has("guid")' src/data/posts.json >/dev/null; then
            echo "❌ First post is missing required fields"
            exit 1
          fi

          echo "✅ Test passed: posts.json is valid and contains $COUNT post(s)"

      - name: Commit posts.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/posts.json
          if git diff --cached --quiet; then
            echo "No changes to posts.json — skipping commit."
          else
            git commit -m "chore: update Medium posts [skip ci]"
            git push
          fi